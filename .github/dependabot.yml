version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: lockfile-only
    labels:
      - security
      - dependencies

  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - security
      - container
